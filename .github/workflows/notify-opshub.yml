name: Notify OpsHub

on:
  workflow_run:
    workflows:
      - CI / Build / Deploy
    types:
      - completed

jobs:
  notify-opshub:
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest

    steps:
      - name: Update OpsHub deployment status
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            set -e
            ts="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            ref="${{ github.repository }}@${{ github.event.workflow_run.head_sha }}"

            curl -fsS -X PATCH "http://localhost:3099/deployments/waoowaoo-prod" \
              -H "Content-Type: application/json" \
              -d "{\"last_deploy\":\"${ts}\",\"health\":\"ok\"}"

            curl -fsS -X POST "http://localhost:3099/events" \
              -H "Content-Type: application/json" \
              -d "{\"time\":\"${ts}\",\"type\":\"deploy\",\"ref\":\"${ref}\",\"detail\":\"GitHub Actions CI succeeded on main\"}"
